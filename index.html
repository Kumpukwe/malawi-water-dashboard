<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malawi Water Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<style>
body{font-family:sans-serif;margin:0;padding:0;}
header{background:#0891b2;color:#fff;padding:10px;text-align:center;}
.tab-buttons{display:flex;gap:10px;padding:10px;justify-content:center;}
.tab-buttons button{padding:10px 15px;cursor:pointer;}
.tab-content{display:none;padding:10px;}
.tab-content.active{display:block;}
.card-grid{display:flex;flex-wrap:wrap;gap:10px;}
.card{flex:1 1 150px;background:#f3f4f6;padding:10px;border-radius:5px;}
#map{height:400px;margin:10px 0;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modal-content{background:#fff;padding:20px;border-radius:5px;width:300px;}
button.export-btn{padding:5px 10px;margin-bottom:10px;}
.dot{height:12px;width:12px;border-radius:50%;display:inline-block;margin-right:5px;}
</style>
</head>
<body>

<header>
<h1>Malawi Water Points Dashboard</h1>
</header>

<div class="tab-buttons">
<button onclick="switchTab('district')">District View</button>
<button onclick="switchTab('national')">National View</button>
</div>

<div id="districtTab" class="tab-content active">
<div class="card-grid">
<div class="card">Total: <span id="cardTotal">0</span></div>
<div class="card">Functional: <span id="cardFunctional">0</span> (<span id="cardFunctionalPct">0%</span>)</div>
<div class="card">Partial: <span id="cardPartial">0</span> (<span id="cardPartialPct">0%</span>)</div>
<div class="card">Not Functional: <span id="cardNotFunctional">0</span> (<span id="cardNotFunctionalPct">0%</span>)</div>
<div class="card">Abandoned: <span id="cardAbandoned">0</span> (<span id="cardAbandonedPct">0%</span>)</div>
</div>
<canvas id="barChart"></canvas>
<canvas id="doughnutChart"></canvas>
<div id="tableContainer"></div>

<h2>Map</h2>
<div id="map"></div>

<button onclick="getCurrentLocation()">📍 Get My Current Location</button>

<!-- Modal for data entry -->
<div id="dataEntryModal" class="modal">
<div class="modal-content">
<h3>Add Water Point</h3>
<form id="addWaterForm">
<input type="text" placeholder="Name" id="entryName" required><br>
<input type="text" placeholder="TA" id="entryTA" required><br>
<input type="text" placeholder="Type" id="entryType" required><br>
<select id="entryStatus">
<option value="Functional">Functional</option>
<option value="Partially functional but in need of repair">Partial</option>
<option value="Not functional">Not functional</option>
<option value="No longer exists or abandoned">Abandoned</option>
</select><br>
Latitude: <input type="text" id="entryLat" readonly><br>
Longitude: <input type="text" id="entryLng" readonly><br>
<button type="submit">Add Water Point</button>
<button type="button" onclick="document.getElementById('dataEntryModal').style.display='none'">Cancel</button>
</form>
</div>
</div>

</div>

<div id="nationalTab" class="tab-content">
<div class="card-grid">
<div class="card">Total: <span id="natCardTotal">0</span></div>
<div class="card">Functional: <span id="natCardFunctional">0</span> (<span id="natCardFunctionalPct">0%</span>)</div>
<div class="card">Partial: <span id="natCardPartial">0</span> (<span id="natCardPartialPct">0%</span>)</div>
<div class="card">Not Functional: <span id="natCardNotFunctional">0</span> (<span id="natCardNotFunctionalPct">0%</span>)</div>
<div class="card">Abandoned: <span id="natCardAbandoned">0</span> (<span id="natCardAbandonedPct">0%</span>)</div>
</div>
<canvas id="nationalChart"></canvas>
<div id="nationalTableContainer"></div>
</div>

<script src="script.js"></script>
</body>
</html>
